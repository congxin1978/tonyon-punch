<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TONYON &#x6253;&#x5361;</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.10)}
h1{text-align:center;font-size:22px;color:#1a1a2e;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:22px;min-height:18px}
.lbl{font-size:13px;color:#555;margin-bottom:6px;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.pb{padding:14px 8px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;font-size:15px;font-weight:600;color:#4a5568;cursor:pointer;width:100%}
.pb.sel{border-color:#667eea;background:#667eea;color:#fff}
.pw{position:relative;margin-bottom:20px}
.pw input{width:100%;padding:14px 44px 14px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:22px;letter-spacing:8px;text-align:center;outline:none}
.pw input:focus{border-color:#667eea}
.ey{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px}
.bt{width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;margin-top:4px}
.bt:disabled{opacity:.45;cursor:not-allowed}
.ok{margin-top:16px;padding:14px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;background:#e6ffed;color:#276749;display:none;white-space:pre-line}
.er{margin-top:16px;padding:14px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;background:#fff5f5;color:#c53030;display:none}
</style>
</head>
<body>
<div class="card">
<h1>&#x1F3EA; TONYON &#x6253;&#x5361;</h1>
<p class="sub" id="clk"></p>
<p class="lbl">&#x9078;&#x64C7;&#x6253;&#x5361;&#x985E;&#x578B;</p>
<div class="grid">
<button class="pb" data-t="clock_in" onclick="sel(this)">&#x2600;&#xFE0F; &#x4E0A;&#x73ED;</button>
<button class="pb" data-t="lunch_out" onclick="sel(this)">&#x1F371; &#x5348;&#x9910;&#x51FA;</button>
<button class="pb" data-t="lunch_in" onclick="sel(this)">&#x1F519; &#x5348;&#x9910;&#x5165;</button>
<button class="pb" data-t="clock_out" onclick="sel(this)">&#x1F319; &#x4E0B;&#x73ED;</button>
</div>
<p class="lbl">&#x8F38;&#x5165; PIN &#x78BC;</p>
<div class="pw">
<input type="password" id="pin" inputmode="numeric" maxlength="8" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="off" oninput="upd()">
<span class="ey" onclick="tp()">&#x1F441;</span>
</div>
<button class="bt" id="go" onclick="go()" disabled>&#x6253;&#x5361;</button>
<div class="ok" id="ok"></div>
<div class="er" id="er"></div>
</div>
<script>
var EP="https://hphdrpykabgxwhyfgxcj.supabase.co/functions/v1/attend-punch";
var TK=new URLSearchParams(window.location.search).get("token")||"";
var PT="",DI="",DT="";
function gdi(){var id=localStorage.getItem("ty_did");if(!id){id="w_"+Math.random().toString(36).slice(2)+Date.now();localStorage.setItem("ty_did",id);}return id;}
DI=gdi();DT=localStorage.getItem("ty_dtk")||"";
function clk(){var n=new Date(),s=n.toLocaleString("zh-Hant",{timeZone:"Australia/Sydney",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});document.getElementById("clk").textContent=s+" (Sydney)"}
setInterval(clk,1000);clk();
function upd(){var ok=PT&&(DT||document.getElementById("pin").value.trim());document.getElementById("go").disabled=!ok;}
function sel(el){document.querySelectorAll(".pb").forEach(function(b){b.classList.remove("sel");});el.classList.add("sel");PT=el.getAttribute("data-t");upd();}
function tp(){var i=document.getElementById("pin");i.type=i.type==="password"?"text":"password";}
(function(){
  if(!TK){document.getElementById("er").textContent="QR code invalid";document.getElementById("er").style.display="block";return;}
  var h=parseInt(new Date().toLocaleString("en",{timeZone:"Australia/Sydney",hour:"2-digit",hour12:false}));
  var a="clock_in";
  if(h>=11&&h<13)a="lunch_out";
  else if(h>=13&&h<14)a="lunch_in";
  else if(h>=17)a="clock_out";
  var b=document.querySelector("[data-t='"+a+"']");
  if(b){b.classList.add("sel");PT=a;}
  upd();
})();
function go(){
  var btn=document.getElementById("go"),ok=document.getElementById("ok"),er=document.getElementById("er");
  btn.disabled=true;ok.style.display="none";er.style.display="none";
  if(!navigator.geolocation){
    er.textContent="此設備不支援GPS定位";er.style.display="block";
    btn.disabled=false;return;
  }
  btn.textContent="定位中…";
  navigator.geolocation.getCurrentPosition(function(pos){
    btn.textContent="打卡中…";
    var pin=document.getElementById("pin").value.trim();
    var body={action:"punch",token:TK,punchType:PT,deviceId:DI,lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(DT)body.deviceToken=DT;
    if(pin)body.pin=pin;
    fetch(EP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){
        if(d.deviceToken){localStorage.setItem("ty_dtk",d.deviceToken);DT=d.deviceToken;}
        ok.textContent=d.msg+"\n"+d.name+"  "+d.time;
        ok.style.display="block";
        document.getElementById("pin").value="";
      }else{
        er.textContent=d.error||"打卡失敗";
        er.style.display="block";
      }
    })
    .catch(function(){er.textContent="網絡錯誤";er.style.display="block";})
    .finally(function(){btn.disabled=false;btn.textContent="打卡";});
  },function(){
    er.textContent="無法取得位置，請允許定位權限後重試";er.style.display="block";
    btn.disabled=false;btn.textContent="打卡";
  },{timeout:10000,maximumAge:60000});
}
</script>
</body>
</html>
